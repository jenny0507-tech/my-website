<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>登录 · 云匣</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: { 50:'#ECFDF5',100:'#D1FAE5',200:'#A7F3D0',500:'#10B981',600:'#059669',700:'#047857' }
        },
        fontFamily: { sans: ['"PingFang SC"', '"Microsoft YaHei"', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased">

  <!-- faded app backdrop -->
  <div class="fixed inset-0 pointer-events-none select-none blur-[2px] opacity-60" aria-hidden="true">
    <div class="flex min-h-screen">
      <aside class="w-64 shrink-0 bg-gray-50/70 border-r border-gray-100 px-6 py-8">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
            <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5 text-white"><path d="M21 8l-9-5-9 5 9 5 9-5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M3 8v8l9 5 9-5V8" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          </div>
          <span class="text-lg font-bold text-gray-900">云匣</span>
        </div>
        <p class="text-xs text-gray-400 mt-2">AI 产品成长训练平台<br/>采集·分析·复盘</p>
      </aside>
      <main class="flex-1 px-10 py-8">
        <h1 class="text-2xl font-bold text-gray-900">灵感方式选择</h1>
        <div class="grid grid-cols-6 gap-4 mt-6">
          <div class="h-16 rounded-xl border border-gray-100 bg-white"></div>
          <div class="h-16 rounded-xl border border-gray-100 bg-white"></div>
          <div class="h-16 rounded-xl border border-gray-100 bg-white"></div>
          <div class="h-16 rounded-xl border border-gray-100 bg-white"></div>
          <div class="h-16 rounded-xl border border-gray-100 bg-white"></div>
          <div class="h-16 rounded-xl border border-gray-100 bg-white"></div>
        </div>
        <div class="grid grid-cols-4 gap-4 mt-8">
          <div class="h-40 rounded-xl border border-gray-100 bg-white"></div>
          <div class="h-40 rounded-xl border border-gray-100 bg-white"></div>
          <div class="h-40 rounded-xl border border-gray-100 bg-white"></div>
          <div class="h-40 rounded-xl border border-gray-100 bg-white"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- dark overlay -->
  <div class="fixed inset-0 bg-gray-900/10 pointer-events-none"></div>

  <!-- login card -->
  <div class="relative z-10 min-h-screen flex items-center justify-center p-6">
    <div class="relative w-full max-w-3xl bg-white rounded-2xl shadow-2xl overflow-hidden flex">

      <!-- 关闭按钮：返回 index.html -->
      <a href="index.html" class="absolute top-4 right-4 z-10 w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400">
        <svg viewBox="0 0 24 24" fill="none" class="w-4 h-4"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </a>

      <!-- left panel -->
      <div class="hidden md:flex w-1/2 bg-gradient-to-br from-brand-50 via-emerald-50 to-teal-100 flex-col items-center justify-center px-10 py-14 text-center relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-40 h-40 rounded-full bg-brand-100/60"></div>
        <div class="absolute -bottom-16 -right-10 w-52 h-52 rounded-full bg-teal-100/60"></div>

        <h2 class="text-2xl font-bold text-gray-900 relative z-10">欢迎来到云匣</h2>
        <p class="text-sm text-gray-500 mt-2 relative z-10">AI 产品成长训练平台</p>
        <p class="text-sm text-gray-500 relative z-10">持续观察，持续成长</p>

        <div class="relative z-10 mt-10">
          <div class="w-32 h-32 rounded-full bg-white/70 flex items-center justify-center shadow-inner mx-auto">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg rotate-6">
              <svg viewBox="0 0 24 24" fill="none" class="w-8 h-8 text-white"><path d="M21 8l-9-5-9 5 9 5 9-5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M3 8v8l9 5 9-5V8" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            </div>
          </div>
          <div class="w-40 h-4 bg-brand-100/70 rounded-full blur-sm mx-auto -mt-2"></div>
        </div>
      </div>

      <!-- right panel: form -->
      <div class="w-full md:w-1/2 px-10 py-12">
        <h3 class="text-xl font-bold text-gray-900">登录云匣</h3>
        <p class="text-sm text-gray-400 mt-1">很高兴再次见到你 👋</p>

        <div class="flex items-center gap-6 mt-6 border-b border-gray-100">
          <button class="pb-3 text-sm font-semibold text-brand-600 border-b-2 border-brand-600">密码登录</button>
          <button class="pb-3 text-sm text-gray-400">验证码登录</button>
        </div>

        <!-- 登录表单：提交跳转 dashboard.html -->
        <form class="mt-6 space-y-4" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
          <div class="relative">
            <svg viewBox="0 0 24 24" fill="none" class="w-4 h-4 text-gray-300 absolute left-3 top-1/2 -translate-y-1/2"><path d="M4 5h16a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V6a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M3 6l9 7 9-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <input type="text" placeholder="请输入邮箱或手机号" class="w-full pl-9 pr-3 py-2.5 text-sm rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-200"/>
          </div>

          <div class="relative">
            <svg viewBox="0 0 24 24" fill="none" class="w-4 h-4 text-gray-300 absolute left-3 top-1/2 -translate-y-1/2"><rect x="4" y="10" width="16" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 10V7a5 5 0 0110 0v3" stroke="currentColor" stroke-width="1.5"/></svg>
            <input id="pw" type="password" placeholder="请输入密码" class="w-full pl-9 pr-9 py-2.5 text-sm rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-200"/>
            <button type="button" onclick="const i=document.getElementById('pw'); i.type = i.type==='password' ? 'text' : 'password';" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300">
              <svg viewBox="0 0 24 24" fill="none" class="w-4 h-4"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>

          <div class="flex items-center justify-between text-xs text-gray-400 pt-1">
            <label class="flex items-center gap-1.5 cursor-pointer">
              <input type="checkbox" class="w-3.5 h-3.5 rounded border-gray-300 text-brand-600 focus:ring-brand-200"/>
              7天内自动登录
            </label>
            <a href="#" class="hover:text-gray-600">忘记密码?</a>
          </div>

          <button type="submit" class="w-full py-2.5 rounded-lg bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold transition">登录</button>
        </form>

        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-gray-100"></div>
          <span class="text-xs text-gray-300">或使用以下方式登录</span>
          <div class="flex-1 h-px bg-gray-100"></div>
        </div>

        <div class="flex items-center justify-center gap-4">
          <button class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50">
            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="#22C55E"><path d="M8.6 3C4.7 3 1.5 5.7 1.5 9.1c0 1.9 1 3.6 2.6 4.8L3.4 16l2.3-1.1c.7.2 1.5.3 2.3.3h.4c-.1-.4-.2-.8-.2-1.2 0-3.4 3.2-6.1 7.2-6.1h.3C15.2 5 12.2 3 8.6 3z"/><path d="M16.6 8.4c-3.4 0-6.1 2.4-6.1 5.3 0 2.9 2.7 5.3 6.1 5.3.7 0 1.4-.1 2-.3l2 1-.6-1.8c1.3-.9 2.1-2.3 2.1-4.2 0-2.9-2.7-5.3-6.1-5.3z" fill-opacity="0.85"/></svg>
          </button>
          <button class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50">
            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="#3B82F6"><path d="M22 12c0-5.5-4.5-10-10-10S2 6.5 2 12c0 4.4 3.2 8.4 7.5 9.6v-6.8H7v-2.8h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6v1.9H15l-.4 2.8h-2.1v6.8C18.8 20.4 22 16.4 22 12z"/></svg>
          </button>
          <button class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50">
            <svg viewBox="0 0 24 24" class="w-5 h-5"><path fill="#4285F4" d="M21.6 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.4a4.6 4.6 0 01-2 3v2.5h3.2c1.9-1.8 3-4.3 3-7.3z"/><path fill="#34A853" d="M12 22c2.7 0 5-.9 6.6-2.4l-3.2-2.5c-.9.6-2 1-3.4 1-2.6 0-4.8-1.8-5.6-4.1H3.1v2.6A10 10 0 0012 22z"/><path fill="#FBBC05" d="M6.4 14a6 6 0 010-4.1V7.3H3.1a10 10 0 000 9.4l3.3-2.6z"/><path fill="#EA4335" d="M12 6.3c1.5 0 2.8.5 3.8 1.5l2.8-2.8A9.6 9.6 0 0012 2a10 10 0 00-8.9 5.3l3.3 2.6C7.2 8 9.4 6.3 12 6.3z"/></svg>
          </button>
        </div>

        <!-- 跳转注册页 -->
        <p class="text-center text-sm text-gray-400 mt-8">
          还没有账号？<a href="register.html" class="text-brand-600 font-semibold hover:underline">立即注册</a>
        </p>
      </div>
    </div>
  </div>

</body>
</html>
